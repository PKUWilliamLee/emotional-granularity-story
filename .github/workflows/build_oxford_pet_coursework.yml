name: Build Oxford Pet Coursework

on:
  push:
    branches:
      - automation/oxford-pet-coursework
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Reconstruct and patch builder
        run: |
          cat automation/oxford_build_parts/part_*.b64 | base64 --decode | gunzip > automation/oxford_pet_build.py
          python - <<'PY'
          from pathlib import Path
          p = Path('automation/oxford_pet_build.py')
          s = p.read_text(encoding='utf-8')
          s = s.replace('from reportlab.pdfbase.ttfonts import TTFont', 'from reportlab.pdfbase.cidfonts import UnicodeCIDFont')
          old = '''    font_candidates=[Path("/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc"),Path("/usr/share/fonts/opentype/noto/NotoSansCJKsc-Regular.otf"),Path("/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf")]
              font_path=next((p for p in font_candidates if p.exists()),None)
              if font_path is None: raise FileNotFoundError("No usable font")
              try: pdfmetrics.registerFont(TTFont("CourseFont",str(font_path),subfontIndex=0))
              except TypeError: pdfmetrics.registerFont(TTFont("CourseFont",str(font_path)))'''.replace('              ', '    ')
          if old not in s:
              raise SystemExit('font block not found')
          s = s.replace(old, '    pdfmetrics.registerFont(UnicodeCIDFont("STSong-Light"))')
          s = s.replace('"CourseFont"', '"STSong-Light"')
          marker = 'def create_report(project: Path) -> None:\n    summary='
          replacement = 'def create_report(project: Path) -> None:\n    from PIL import Image\n    summary='
          if marker not in s:
              raise SystemExit('create_report marker not found')
          s = s.replace(marker, replacement)
          p.write_text(s, encoding='utf-8')
          PY
          python -m py_compile automation/oxford_pet_build.py
          wc -c automation/oxford_pet_build.py

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          python -m pip install numpy pandas scikit-learn matplotlib Pillow jupyter nbformat nbclient reportlab pytest

      - name: Build, train, evaluate, and package
        shell: bash
        run: |
          set -o pipefail
          python automation/oxford_pet_build.py --output dist 2>&1 | tee build.log

      - name: Show diagnostic tail
        if: always()
        run: |
          echo '===== LAST 180 BUILD LOG LINES ====='
          tail -n 180 build.log || true
          echo '===== OUTPUT FILES ====='
          find dist -maxdepth 2 -type f -printf '%p %s bytes\n' || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OxfordIIITPet-build-diagnostics
          path: build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload completed coursework
        uses: actions/upload-artifact@v4
        with:
          name: OxfordIIITPet-coursework-202312033029
          path: dist/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
